{% extends "base.html" %}
{% block title %}Internal Server Error - Career Guidance System{% endblock %}
{% block content %}

<div class="container d-flex align-items-center justify-content-center py-5" style="min-height: calc(100vh - 100px);">
  <div class="text-center">
    <h1 class="display-1 fw-bold text-danger" style="font-size: 8rem;"><i class="bi bi-exclamation-triangle"></i></h1>
    <h3 class="fw-bold text-light mb-3">500 - Internal Server Error</h3>
    <p class="text-muted mb-4 mx-auto" style="max-width: 500px;">Oops! Something went wrong on our end. We're already looking into it. Please try again later.</p>
    
    <div class="d-flex justify-content-center gap-3">
      <a href="javascript:history.back()" class="btn btn-outline-light"><i class="bi bi-arrow-left me-2"></i>Go Back</a>
      <a href="{{ url_for('home') }}" class="btn btn-primary"><i class="bi bi-house-door-fill me-2"></i>Return Home</a>
    </div>
  </div>
</div>

{% endblock %}
